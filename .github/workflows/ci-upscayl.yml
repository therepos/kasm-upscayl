name: Build Upscayl

on:
  push:
    branches: [main]
    paths:
      - "upscayl/**"
      - ".github/workflows/ci-upscayl.yml"
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      kasm_version:
        description: "Kasm base image version"
        required: false
        default: "1.17.0"

env:
  REGISTRY: ghcr.io
  KASM_VERSION: "1.17.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./upscayl
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/therepos/kasm-images/upscayl:latest
            ${{ env.REGISTRY }}/therepos/kasm-images/upscayl:${{ github.event.inputs.kasm_version || env.KASM_VERSION }}
          build-args: |
            KASM_VERSION=${{ github.event.inputs.kasm_version || env.KASM_VERSION }}
          cache-from: type=gha,scope=upscayl
          cache-to: type=gha,mode=max,scope=upscayl