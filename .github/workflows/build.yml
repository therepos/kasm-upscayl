name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - "*/Dockerfile"
      - ".github/workflows/build.yml"
  schedule:
    # Rebuild weekly on Sunday 03:00 UTC to pick up upstream updates
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build (or 'all')"
        required: false
        default: "all"
      kasm_version:
        description: "Kasm base image version"
        required: false
        default: "1.17.0"

env:
  REGISTRY: ghcr.io
  KASM_VERSION: "1.17.0"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine which images to build
        id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.image }}"

          if [[ "${{ github.event_name }}" == "schedule" || "${INPUT}" == "all" || -z "${INPUT}" ]]; then
            # Build all images that have a non-placeholder Dockerfile
            IMAGES=$(find . -maxdepth 2 -name Dockerfile -exec grep -L "^# TODO" {} \; \
              | sed 's|./||;s|/Dockerfile||' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            IMAGES="[\"${INPUT}\"]"
          fi

          echo "images=${IMAGES}" >> "$GITHUB_OUTPUT"
          echo "Building: ${IMAGES}"

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.images != '[]' && needs.detect-changes.outputs.images != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          KASM_VER="${{ github.event.inputs.kasm_version || env.KASM_VERSION }}"
          echo "kasm_version=${KASM_VER}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.image }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/therepos/kasm-images/${{ matrix.image }}:${{ steps.version.outputs.kasm_version }}
            ${{ env.REGISTRY }}/therepos/kasm-images/${{ matrix.image }}:latest
          build-args: |
            KASM_VERSION=${{ steps.version.outputs.kasm_version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
