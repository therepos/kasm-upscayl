name: Build and Push to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Rebuild weekly on Sunday at 03:00 UTC to pick up Upscayl updates
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      kasm_version:
        description: "Kasm base image version"
        required: false
        default: "1.17.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        kasm_version: ["1.17.0"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with kasm version
            type=raw,value=${{ matrix.kasm_version }}
            # Tag with git tag if present
            type=semver,pattern={{version}}
            # Tag latest on main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with date for weekly builds
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KASM_VERSION=${{ matrix.kasm_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
