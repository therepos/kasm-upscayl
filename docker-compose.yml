services:
  upscayl:
    image: ghcr.io/therepos/kasm-images/upscayl:latest
    container_name: upscayl
    ports:
      - "3029:6901"
    environment:
      - VNC_PW=${VNC_PW}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    shm_size: 512m
    runtime: nvidia
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      - /mnt/sec/media/shared:/home/kasm-user/Downloads